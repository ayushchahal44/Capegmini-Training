<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #parent {
        display: grid;
        width: 100%;
        height: 96vh;
        background-color: beige;
        grid-template-rows: 1fr 1fr 1fr;
        /* grid-template-rows: repeat(3,2fr); */
        /* px is not responsive */
        grid-template-columns: 1fr 5fr 1fr;
        gap: 30px;
        grid-template-areas:
        "a b b"
        "c c d"
        "e e e";
      }
      .child {
        width: auto;
        height: auto;
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <div id="parent">
      <div class="child" style="grid-area: a;"></div>
      <div class="child" style="grid-area: b;"></div>
      <div class="child" style="grid-area: c;"></div>
      <div class="child" style="grid-area: d;"></div>
      <div class="child" style="grid-area: e;"></div>
      <div class="child" style="grid-area: f;"></div>
    </div>
  </body>
</html>

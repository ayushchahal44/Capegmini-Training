<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products UI</title>

  <!-- Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0;
    }

    .price {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Product List</h1>

  <div class="container" id="productContainer"></div>

  <script>
    let api = "https://api.escuelajs.co/api/v1/products";

    function fetchData() {
      axios.get(api)
        .then(response => {
          let data = response.data;
          let container = document.getElementById("productContainer");

          data.forEach(item => {
            container.innerHTML += `
              <div class="card">
                <img src="${item.images[0]}" alt="product"/>
                <div class="title">${item.title}</div>
                <div class="price">₹ ${item.price}</div>
                <p>${item.category.name}</p>
              </div>
            `;
          });
        })
        .catch(error => {
          console.log(error);
        });
    }

    fetchData();
  </script>

</body>
</html>

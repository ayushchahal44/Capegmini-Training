<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Application</title>
     <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <header class="h-16 flex items-center justify-center">
      <h1 class="text-xl font-bold">Quiz Application</h1>
    </header>

    <main>
      <section>
        <!-- Question 1 -->
        <p>What is most famous German car brand?</p>

        <input type="radio" name="q1" id="q1a" value="Porsche" />
        <label for="q1a">Porsche</label><br />

        <input type="radio" name="q1" id="q1b" value="Mercedes" />
        <label for="q1b">Mercedes</label><br />

        <input type="radio" name="q1" id="q1c" value="Audi" />
        <label for="q1c">Audi</label><br />

        <input type="radio" name="q1" id="q1d" value="BMW" />
        <label for="q1d">BMW</label><br />

        <input type="radio" name="q1" id="q1e" value="Volkswagen" />
        <label for="q1e">Volkswagen</label><br />

        <p id="q1a-result">Correct</p>
        

        <!-- Question 2 -->
        <p>What is most famous Indian Food?</p>

        <input type="radio" name="q2" id="q2a" value="Butter Chicken" />
        <label for="q2a">Butter Chicken</label><br />

        <input type="radio" name="q2" id="q2b" value="Naan" />
        <label for="q2b">Naan</label><br />

        <input type="radio" name="q2" id="q2c" value="Kadai Paneer" />
        <label for="q2c">Kadai Paneer</label><br />

        <input type="radio" name="q2" id="q2d" value="Samosa" />
        <label for="q2d">Samosa</label><br />

        <input type="radio" name="q2" id="q2e" value="Gulab Jamun" />
        <label for="q2e">Gulab Jamun</label><br />

        <p id="q2a-result">Correct</p>

        <!-- Question 3 -->
        <p>What is most famous sport?</p>

        <input type="radio" name="q3" id="q3a" value="Cricket" />
        <label for="q3a">Cricket</label><br />

        <input type="radio" name="q3" id="q3b" value="Football" />
        <label for="q3b">Football</label><br />

        <input type="radio" name="q3" id="q3c" value="Basketball" />
        <label for="q3c">Basketball</label><br />

        <input type="radio" name="q3" id="q3d" value="F1" />
        <label for="q3d">F1</label><br />

        <input type="radio" name="q3" id="q3e" value="Baseball" />
        <label for="q3e">Baseball</label><br />

        <p id="q3a-result">Correct</p>
      </section>
    </main>

    <footer>
      <h4>This is the footer</h4>
    </footer>
  </body>
</html>

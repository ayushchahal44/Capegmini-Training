<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unorder List</title>
</head>
<body>
    <h3>Unorder List</h3>
    <h5>Type - Circle</h5>
    <ul type="circle">
        <li>Shoe</li>
        <li>Watch</li>
        <li>Jeans</li>
        <li>Jeans</li>
    </ul>
    <h5>Type - Square</h5>
    <ul type="square">
        <li>Shoe</li>
        <li>Watch</li>
        <li>Jeans</li>
        <li>Jeans</li>
    </ul>
    <h5>Type - Disc</h5>
    <ul type="disc">
        <li>Shoe</li>
        <li>Watch</li>
        <li>Jeans</li>
        <li>Jeans</li>
    </ul>
    <h5>Type - None</h5>
    <ul type="none">
        <li>Shoe</li>
        <li>Watch</li>
        <li>Jeans</li>
        <li>Jeans</li>
    </ul>
</body>
</html>

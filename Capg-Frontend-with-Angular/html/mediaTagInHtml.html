<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Tags in HTML</title>
</head>
<body>
    <!-- Media Tag 1: Image -->
    <img src="https://picsum.photos/id/1074/120/120" title="Lion" alt="Unable to load image." height="140" width="140">
    
    <!-- Media Tag 2: Video -->
    <video src="Path-of-downloaded-video.mp4" height="140" width="140" controls loop autoplay poster="https://picsum.photos/id/1074/120/120"></video>
    <!-- Works with YouTube embed -->
     <br>
    <iframe width="140" height="140" src="https://www.youtube.com/embed/y6WnOV1HwW8" frameborder="0" allowfullscreen></iframe>

    <!-- Media Tag 3: Audio -->
     <br>
    <audio src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" controls>
        Audio not supported.
    </audio>
</body>
</html>

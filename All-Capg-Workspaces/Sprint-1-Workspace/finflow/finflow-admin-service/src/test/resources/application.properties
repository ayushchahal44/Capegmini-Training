spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:finflow_admin_test;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

finflow.jwt.secret=finflow-secret-finflow-secret-finflow
finflow.jwt.expiration-ms=86400000

eureka.client.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

finflow.services.auth.url=http://localhost:8081
finflow.services.application.url=http://localhost:8082
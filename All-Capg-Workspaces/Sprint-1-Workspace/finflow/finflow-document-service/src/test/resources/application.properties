spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:finflow_doc_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

eureka.client.enabled=false

finflow.jwt.secret=test-secret-key-for-jwt-minimum-256-bits-long-string-here
finflow.jwt.expiration-ms=86400000

finflow.services.application.url=http://localhost:8082

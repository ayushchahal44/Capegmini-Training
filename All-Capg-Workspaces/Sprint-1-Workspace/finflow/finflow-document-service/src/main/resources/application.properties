spring.application.name=finflow-document-service
server.port=8083

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://finflow-mysql:3306/finflowdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finflow}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:finflow}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

finflow.jwt.secret=${FINFLOW_JWT_SECRET:finflow-dev-secret-key-change-me-please-use-256-bits-minimum-for-hs256-algorithm}
finflow.jwt.expiration-ms=86400000

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

finflow.storage.root=${FINFLOW_STORAGE_ROOT:uploads}

finflow.services.application.url=${FINFLOW_SERVICES_APPLICATION_URL:http://finflow-application-service}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://finflow-eureka:8761/eureka}
eureka.instance.prefer-ip-address=true

# RabbitMQ Configuration
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Swagger UI Configuration
springdoc.api-docs.path=/api/documents/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

management.endpoints.web.exposure.include=health,tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://finflow-zipkin:9411/api/v2/spans}

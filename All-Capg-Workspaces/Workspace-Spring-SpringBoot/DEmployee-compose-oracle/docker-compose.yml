version: '3.8'

services:

  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    ports:
      - "1522:1521"
    environment:
      ORACLE_PASSWORD: oracle
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'SELECT 1 FROM dual;' | sqlplus system/oracle@XEPDB1"]
      interval: 10s
      timeout: 5s
      retries: 10

  employee-service:
    build: ./employee-service
    ports:
      - "7073:7073"
    depends_on:
      oracle-db:
        condition: service_healthy

  address-service:
    build: ./address-service
    ports:
      - "7074:7074"
    depends_on:
      oracle-db:
        condition: service_healthy

volumes:
  oracle-data: